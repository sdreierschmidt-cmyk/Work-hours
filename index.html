<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Work Hours" />
<title>Work Hours</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #161616; --bg3: #1e1e1e;
    --border: #222; --border2: #1a1a1a;
    --text: #f0ece4; --muted: #888; --dim: #555; --faint: #333;
    --gold: #e8c87a; --green: #7ecb9e; --red: #e07a6a; --blue: #7a9fd4;
    --bluebg: #111318; --todaybg: #141410;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; -webkit-tap-highlight-color: transparent; }
  input, button, select { font-family: 'DM Mono', monospace; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { background: var(--bg2); border-bottom: 1px solid #252525; padding: 20px 20px 0; position: sticky; top: 0; z-index: 10; }
  .header-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
  .header-title h1 { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: -0.5px; }
  .header-title span { font-size: 11px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
  .header-sub { font-size: 11px; color: #444; letter-spacing: 1px; margin-bottom: 16px; }
  .tabs { display: flex; }
  .tab { padding: 8px 18px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* Check-in panel */
  .checkin-panel { margin: 14px 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .checkin-top { padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
  .checkin-label { font-size: 11px; color: var(--dim); letter-spacing: 1.5px; margin-bottom: 4px; }
  .checkin-time { font-size: 26px; font-weight: 300; letter-spacing: -1px; }
  .checkin-time.running { color: var(--green); }
  .checkin-elapsed { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .checkin-btn { border: none; border-radius: 8px; padding: 14px 22px; font-size: 13px; font-weight: 500; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
  .checkin-btn:active { transform: scale(0.96); }
  .checkin-btn.start { background: var(--green); color: #0f0f0f; }
  .checkin-btn.stop  { background: var(--red);   color: #0f0f0f; }
  .checkin-saved { padding: 10px 18px; background: #0f1a14; border-top: 1px solid #1a2a1f; font-size: 12px; color: var(--green); letter-spacing: 0.5px; }

  /* Week nav */
  .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border2); }
  .week-nav button { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px 10px; line-height: 1; }
  .week-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-align: center; }

  /* Summary */
  .summary { margin: 14px 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; }
  .summary-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .summary-col label { font-size: 11px; color: var(--dim); letter-spacing: 1.5px; display: block; margin-bottom: 4px; }
  .summary-col .big { font-size: 28px; font-weight: 300; letter-spacing: -1px; }
  .progress-track { margin-top: 14px; background: #222; border-radius: 2px; height: 3px; }
  .progress-bar { height: 3px; border-radius: 2px; transition: width 0.4s; }
  .progress-label { margin-top: 6px; font-size: 10px; color: #444; }

  /* Day rows */
  .day-row { padding: 14px 20px; border-bottom: 1px solid var(--border2); cursor: pointer; border-left: 2px solid transparent; transition: background 0.1s; }
  .day-row:active { background: #1a1a1a; }
  .day-row.is-today   { background: var(--todaybg); border-left-color: var(--gold); }
  .day-row.is-weekend { background: var(--bluebg);  border-left-color: var(--blue); }
  .day-inner { display: flex; justify-content: space-between; align-items: center; }
  .day-left .day-name { display: flex; align-items: center; gap: 8px; font-size: 13px; letter-spacing: 0.5px; }
  .day-left .day-name.today   { color: var(--gold); }
  .day-left .day-name.weekend { color: var(--blue); }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; }
  .badge-today   { background: #e8c87a22; color: var(--gold); }
  .badge-weekend { background: #4a6fa522; color: var(--blue); }
  .badge-absence { background: #e07a6a22; color: var(--red); font-size: 9px; padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; }
  .day-sub { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .day-right { text-align: right; flex-shrink: 0; }
  .day-right .worked   { font-size: 15px; }
  .day-right .overtime { font-size: 11px; }
  .tap-hint { font-size: 11px; color: var(--faint); letter-spacing: 1px; }

  /* Editor */
  .editor { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; }
  .editor-fields { display: flex; gap: 10px; margin-bottom: 10px; }
  .field { flex: 1; }
  .field label { font-size: 10px; color: var(--dim); letter-spacing: 1px; display: block; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--bg3); border: 1px solid #2a2a2a; border-radius: 4px; padding: 10px 12px; color: var(--text); font-size: 16px; outline: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus { border-color: #444; }
  .field.full { flex: none; width: 100%; margin-bottom: 10px; }
  .field.full input, .field.full select { font-size: 13px; }

  /* Absence toggle */
  .absence-toggle { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .absence-chip { border: 1px solid #2a2a2a; background: var(--bg3); color: var(--muted); border-radius: 20px; padding: 6px 14px; font-size: 11px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; }
  .absence-chip.active { background: #2a1a1a; border-color: var(--red); color: var(--red); }

  /* Comment presets */
  .preset-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .preset-chip { border: 1px solid #2a2a2a; background: var(--bg3); color: var(--muted); border-radius: 20px; padding: 6px 14px; font-size: 11px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; white-space: nowrap; }
  .preset-chip.active { background: #1a2a1a; border-color: var(--green); color: var(--green); }

  .preview { background: #1a1a1a; border-radius: 4px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 12px; }
  .editor-btns { display: flex; gap: 8px; }
  .btn { border: none; border-radius: 4px; padding: 12px 16px; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-save   { flex: 1; background: var(--gold); color: #0f0f0f; font-weight: 500; }
  .btn-del    { background: #2a1a1a; color: var(--red); }
  .btn-cancel { background: var(--bg3); color: #666; }

  /* Balance */
  .balance { margin: 18px 20px 0; padding: 14px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
  .balance label { font-size: 11px; color: var(--dim); letter-spacing: 1.5px; }
  .balance .val { font-size: 18px; }

  /* History */
  .history-week { border-bottom: 1px solid var(--border2); }
  .history-header { padding: 12px 20px; background: #131313; display: flex; justify-content: space-between; align-items: center; }
  .history-header .wk-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
  .history-header .wk-right { text-align: right; }
  .history-header .wk-total { font-size: 14px; }
  .history-header .wk-ot    { font-size: 11px; }
  .history-day { padding: 10px 20px 10px 30px; border-bottom: 1px solid #181818; display: flex; justify-content: space-between; }
  .history-day .hd-name   { font-size: 12px; color: #aaa; }
  .history-day .hd-sub    { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .history-day .hd-right  { text-align: right; flex-shrink: 0; }
  .history-day .hd-worked { font-size: 13px; color: #ddd; }
  .history-day .hd-ot     { font-size: 11px; }

  .empty { text-align: center; padding: 60px 24px; color: #444; font-size: 13px; line-height: 1.8; }
  .green { color: var(--green); } .red { color: var(--red); } .muted-c { color: var(--muted); }
  .spacer { height: 40px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const WEEKLY_TARGET  = 32;
const DAILY_TARGET   = WEEKLY_TARGET / 5;
const ABSENCE_TYPES  = ['Day off', 'Sick', 'Child sick', 'Holiday'];
const COMMENT_PRESETS= ['From home', 'On site', 'Travel', 'Training'];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function timeToHours(t) {
  if (!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h + m/60;
}
function hoursToHM(h) {
  if (h===null||isNaN(h)) return '--:--';
  const sign=h<0?'-':'', abs=Math.abs(h);
  const hh=Math.floor(abs), mm=Math.round((abs-hh)*60);
  return `${sign}${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function getWeekKey(date) {
  const d=new Date(date), day=d.getDay()||7;
  d.setDate(d.getDate()-day+1);
  return d.toISOString().split('T')[0];
}
function getWeekDates(wk) {
  const s=new Date(wk);
  return Array.from({length:7},(_,i)=>{ const d=new Date(s); d.setDate(s.getDate()+i); return d.toISOString().split('T')[0]; });
}
function formatDate(ds) { return new Date(ds).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function isWeekend(ds)  { const d=new Date(ds).getDay(); return d===0||d===6; }
function isFriday(ds)   { return new Date(ds).getDay()===5; }
function todayStr()     { return new Date().toISOString().split('T')[0]; }
function nowHHMM()      { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function currentWeekKey(){ return getWeekKey(new Date()); }
function defaultHours(ds){
  if (isWeekend(ds)) return {start:'09:00',end:'15:00',note:'',absence:''};
  if (isFriday(ds))  return {start:'08:15',end:'14:15',note:'',absence:''};
  return {start:'08:15',end:'14:45',note:'',absence:''};
}
function otColor(v){ return v>0.01?'green':v<-0.01?'red':'muted-c'; }

// ─── Storage ──────────────────────────────────────────────────────────────────
function loadEntries()  { try { return JSON.parse(localStorage.getItem('wh-entries')||'{}'); } catch { return {}; } }
function saveEntries(e) { try { localStorage.setItem('wh-entries',JSON.stringify(e)); } catch {} }
function loadCheckin()  { try { return JSON.parse(localStorage.getItem('wh-checkin')||'null'); } catch { return null; } }
function saveCheckin(c) { try { localStorage.setItem('wh-checkin',JSON.stringify(c)); } catch {} }

// ─── App state (only things that trigger full re-render) ──────────────────────
let entries    = loadEntries();
let checkin    = loadCheckin();
let savedMsg   = false;
let view       = 'week';
let weekKey    = currentWeekKey();
let editingDay = null;         // dateStr of open editor, or null

// ─── Editor local state (never triggers re-render) ────────────────────────────
// Lives in editorForm; DOM inputs are the source of truth while editor is open.
let editorForm = {start:'',end:'',note:'',absence:''};

let elapsedInterval = null;

// ─── Re-render ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());
  if (view==='week') {
    app.appendChild(renderCheckinPanel());
    app.appendChild(renderWeekView());
  } else {
    app.appendChild(renderHistoryView());
  }
}

// ─── DOM helper ───────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if      (k==='class') e.className=v;
    else if (k==='style') e.setAttribute('style',v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for (const c of children.flat()) {
    if (c==null) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}

// ─── Check-in panel ───────────────────────────────────────────────────────────
function renderCheckinPanel() {
  const isRunning = !!checkin;
  function elapsed() {
    if (!checkin) return '';
    const [sh,sm]=checkin.time.split(':').map(Number);
    const s=new Date(); s.setHours(sh,sm,0,0);
    const diff=Math.max(0,Math.floor((Date.now()-s)/1000));
    return `${String(Math.floor(diff/3600)).padStart(2,'0')}:${String(Math.floor((diff%3600)/60)).padStart(2,'0')} elapsed`;
  }
  const elapsedEl = el('div',{class:'checkin-elapsed'}, isRunning?elapsed():'');
  clearInterval(elapsedInterval);
  if (isRunning) elapsedInterval=setInterval(()=>{ elapsedEl.textContent=elapsed(); },30000);

  const btn = el('button',{class:`checkin-btn ${isRunning?'stop':'start'}`,onClick:()=>{
    if (isRunning) {
      const end=nowHHMM(), ds=checkin.date;
      const ex=entries[ds]||{};
      entries={...entries,[ds]:{start:checkin.time,end,note:ex.note||'',absence:ex.absence||'',worked:timeToHours(end)-timeToHours(checkin.time)}};
      saveEntries(entries);
      checkin=null; saveCheckin(null);
      weekKey=getWeekKey(ds); savedMsg=true; editingDay=null;
      render();
      setTimeout(()=>{ savedMsg=false; render(); },3000);
    } else {
      const ds=todayStr();
      checkin={time:nowHHMM(),date:ds}; saveCheckin(checkin);
      savedMsg=false; render();
    }
  }}, isRunning?'CHECK OUT':'CHECK IN');

  const panel=el('div',{class:'checkin-panel'},
    el('div',{class:'checkin-top'},
      el('div',{},
        el('div',{class:'checkin-label'},isRunning?'CHECKED IN AT':'READY TO START'),
        el('div',{class:`checkin-time${isRunning?' running':''}`},isRunning?checkin.time:nowHHMM()),
        elapsedEl
      ),
      btn
    )
  );
  if (savedMsg) panel.appendChild(el('div',{class:'checkin-saved'},'✓ Hours logged from check-in/out'));
  return panel;
}

// ─── Header ───────────────────────────────────────────────────────────────────
function renderHeader() {
  return el('div',{class:'header'},
    el('div',{class:'header-title'}, el('h1',{},'Work Hours'), el('span',{},'tracker')),
    el('div',{class:'header-sub'},'32h/week · 6h 24min/day target'),
    el('div',{class:'tabs'},
      el('div',{class:`tab${view==='week'?' active':''}`,onClick:()=>{ view='week'; editingDay=null; render(); }},'Week'),
      el('div',{class:`tab${view==='history'?' active':''}`,onClick:()=>{ view='history'; editingDay=null; render(); }},'History')
    )
  );
}

// ─── Editor (does NOT call render() on input changes) ─────────────────────────
function buildEditor(dateStr, existingEntry) {
  // editorForm is the live state; inputs update it directly without re-rendering
  const wrap = el('div',{class:'editor',onClick:e=>e.stopPropagation()});

  // ── Absence chips ──
  const absLabel = el('div',{class:'field',style:'margin-bottom:8px'}, el('label',{},'ABSENCE TYPE'));
  const absRow   = el('div',{class:'absence-toggle'});

  function refreshAbsenceChips() {
    absRow.innerHTML='';
    ABSENCE_TYPES.forEach(a=>{
      const chip=el('div',{class:`absence-chip${editorForm.absence===a?' active':''}`,onClick:()=>{
        editorForm.absence = editorForm.absence===a?'':a;
        refreshAbsenceChips();
        timeFieldsWrap.style.display = editorForm.absence?'none':'';
        refreshPreview();
      }},a);
      absRow.appendChild(chip);
    });
  }
  refreshAbsenceChips();
  wrap.appendChild(absLabel);
  wrap.appendChild(absRow);

  // ── Time fields ──
  const startInput = el('input',{type:'time',value:editorForm.start});
  const endInput   = el('input',{type:'time',value:editorForm.end});
  // Use 'change' for time pickers (fires after picker closes, not on every scroll tick)
  startInput.addEventListener('change', e=>{ editorForm.start=e.target.value; refreshPreview(); });
  endInput.addEventListener('change',   e=>{ editorForm.end=e.target.value;   refreshPreview(); });

  const timeFieldsWrap = el('div',{class:'editor-fields',style: editorForm.absence?'display:none':''},
    el('div',{class:'field'}, el('label',{},'START'), startInput),
    el('div',{class:'field'}, el('label',{},'END'),   endInput)
  );
  wrap.appendChild(timeFieldsWrap);

  // ── Comment presets ──
  const presetLabel = el('div',{class:'field',style:'margin-bottom:6px'}, el('label',{},'COMMENT'));
  const presetRow   = el('div',{class:'preset-row'});
  const noteInput   = el('input',{type:'text',value:editorForm.note,placeholder:'or type a custom note…'});
  // Use 'input' for text — it's fine since it doesn't re-render the page
  noteInput.addEventListener('input', e=>{ editorForm.note=e.target.value; refreshPresetChips(); });

  function refreshPresetChips() {
    presetRow.innerHTML='';
    COMMENT_PRESETS.forEach(p=>{
      const chip=el('div',{class:`preset-chip${editorForm.note===p?' active':''}`,onClick:()=>{
        editorForm.note = editorForm.note===p?'':p;
        noteInput.value = editorForm.note;
        refreshPresetChips();
      }},p);
      presetRow.appendChild(chip);
    });
  }
  refreshPresetChips();

  wrap.appendChild(presetLabel);
  wrap.appendChild(presetRow);
  wrap.appendChild(el('div',{class:'field full'}, noteInput));

  // ── Preview ──
  const previewEl = el('div',{class:'preview'});
  function refreshPreview() {
    if (editorForm.absence) { previewEl.style.display='none'; return; }
    const s=timeToHours(editorForm.start), en=timeToHours(editorForm.end);
    if (s===null||en===null||en<=s) { previewEl.style.display='none'; return; }
    const w=en-s, ot=w-DAILY_TARGET;
    previewEl.style.display='';
    previewEl.innerHTML='';
    const left=document.createElement('span'); left.style.color='var(--muted)'; left.textContent='Hours: ';
    const lv=document.createElement('span'); lv.style.color='var(--text)'; lv.textContent=hoursToHM(w);
    left.appendChild(lv);
    const right=document.createElement('span'); right.className=otColor(ot); right.textContent=(ot>=0?'+':'')+hoursToHM(ot)+' overtime';
    previewEl.appendChild(left); previewEl.appendChild(right);
  }
  refreshPreview();
  wrap.appendChild(previewEl);

  // ── Buttons ──
  const btns = el('div',{class:'editor-btns'});
  btns.appendChild(el('button',{class:'btn btn-save',onClick:()=>{
    let newEntry;
    if (editorForm.absence) {
      newEntry={start:'',end:'',note:editorForm.note,absence:editorForm.absence,worked:0};
    } else {
      const s=timeToHours(editorForm.start), en=timeToHours(editorForm.end);
      if (s===null||en===null||en<=s) return;
      newEntry={start:editorForm.start,end:editorForm.end,note:editorForm.note,absence:'',worked:en-s};
    }
    entries={...entries,[dateStr]:newEntry};
    saveEntries(entries);
    editingDay=null; render();
  }},'SAVE'));

  if (existingEntry) {
    btns.appendChild(el('button',{class:'btn btn-del',onClick:()=>{
      const ne={...entries}; delete ne[dateStr]; entries=ne;
      saveEntries(entries); editingDay=null; render();
    }},'DEL'));
  }
  btns.appendChild(el('button',{class:'btn btn-cancel',onClick:()=>{ editingDay=null; render(); }},'✕'));
  wrap.appendChild(btns);

  return wrap;
}

// ─── Week view ────────────────────────────────────────────────────────────────
function renderWeekView() {
  const wrap=el('div',{});
  const dates=getWeekDates(weekKey);
  const isThisWeek=weekKey===currentWeekKey();

  // Nav
  wrap.appendChild(el('div',{class:'week-nav'},
    el('button',{onClick:()=>{ const d=new Date(weekKey); d.setDate(d.getDate()-7); weekKey=d.toISOString().split('T')[0]; editingDay=null; render(); }},'‹'),
    el('div',{class:'week-label'},isThisWeek?'THIS WEEK':`WEEK OF ${new Date(weekKey).toLocaleDateString('en-GB',{day:'numeric',month:'short'}).toUpperCase()}`),
    el('button',{onClick:()=>{ const d=new Date(weekKey); d.setDate(d.getDate()+7); weekKey=d.toISOString().split('T')[0]; editingDay=null; render(); }},'›')
  ));

  // Summary
  const weekTotal=dates.reduce((s,d)=>{ const e=entries[d]; return s+(e&&!e.absence?e.worked||0:0); },0);
  const weekOT=weekTotal-WEEKLY_TARGET;
  const pct=Math.min(100,(weekTotal/WEEKLY_TARGET)*100);
  wrap.appendChild(el('div',{class:'summary'},
    el('div',{class:'summary-row'},
      el('div',{class:'summary-col'}, el('label',{},'WEEK TOTAL'), el('div',{class:'big'},hoursToHM(weekTotal))),
      el('div',{class:'summary-col'}, el('label',{},'OVERTIME'),   el('div',{class:`big ${otColor(weekOT)}`},(weekOT>=0?'+':'')+hoursToHM(weekOT)))
    ),
    el('div',{class:'progress-track'}, el('div',{class:'progress-bar',style:`width:${pct}%;background:${weekOT>=0?'var(--green)':'var(--gold)'}`})),
    el('div',{class:'progress-label'},`${Math.round(pct)}% of 32h target`)
  ));

  // Days
  const td=todayStr();
  for (const ds of dates) {
    const entry=entries[ds];
    const isToday=ds===td, isWE=isWeekend(ds), isEditing=editingDay===ds;
    const hasAbsence=entry?.absence;
    const dayOT=entry&&!hasAbsence?entry.worked-DAILY_TARGET:null;

    let rc='day-row';
    if (isToday) rc+=' is-today'; else if (isWE) rc+=' is-weekend';

    const badges=[];
    if (isToday) badges.push(el('span',{class:'badge badge-today'},'TODAY'));
    else if (isWE) badges.push(el('span',{class:'badge badge-weekend'},'WEEKEND'));
    if (hasAbsence) badges.push(el('span',{class:'badge-absence'},hasAbsence.toUpperCase()));

    const sub=[];
    if (entry&&!hasAbsence) sub.push(`${entry.start} – ${entry.end}`);
    if (entry?.note) sub.push(entry.note);

    const row=el('div',{class:rc,onClick:()=>{
      if (editingDay===ds) return;
      // Snapshot current entry into editorForm
      editorForm = entry
        ? {start:entry.start||'',end:entry.end||'',note:entry.note||'',absence:entry.absence||''}
        : defaultHours(ds);
      editingDay=ds; render();
    }},
      el('div',{class:'day-inner'},
        el('div',{class:'day-left'},
          el('div',{class:`day-name${isToday?' today':isWE?' weekend':''}`}, formatDate(ds), ...badges),
          sub.length?el('div',{class:'day-sub'},sub.join(' · ')):null
        ),
        el('div',{class:'day-right'},
          entry
            ? hasAbsence
              ? el('div',{class:'tap-hint',style:'color:var(--dim)'},'—')
              : [el('div',{class:'worked'},hoursToHM(entry.worked)), el('div',{class:`overtime ${otColor(dayOT)}`},(dayOT>=0?'+':'')+hoursToHM(dayOT))]
            : el('div',{class:'tap-hint'},'TAP TO LOG')
        )
      )
    );
    wrap.appendChild(row);
    if (isEditing) wrap.appendChild(buildEditor(ds, entry));
  }

  // Balance
  const totalOT=Object.values(entries).reduce((s,e)=>s+(e.absence?0:(e.worked-DAILY_TARGET)),0);
  wrap.appendChild(el('div',{class:'balance'},
    el('label',{},'ALL-TIME OVERTIME BALANCE'),
    el('div',{class:`val ${otColor(totalOT)}`},(totalOT>=0?'+':'')+hoursToHM(totalOT))
  ));
  wrap.appendChild(el('div',{class:'spacer'}));
  return wrap;
}

// ─── History view ─────────────────────────────────────────────────────────────
function renderHistoryView() {
  const wrap=el('div',{});
  const allWeeks=[...new Set(Object.keys(entries).map(getWeekKey))].sort().reverse();
  if (!allWeeks.length) {
    wrap.appendChild(el('div',{class:'empty'},'No hours logged yet.\nGo to Week view to add your first entry.'));
    return wrap;
  }
  for (const wk of allWeeks) {
    const dates=getWeekDates(wk);
    const wTotal=dates.reduce((s,d)=>s+(entries[d]&&!entries[d].absence?entries[d].worked||0:0),0);
    const wOT=wTotal-WEEKLY_TARGET;
    const sec=el('div',{class:'history-week'},
      el('div',{class:'history-header'},
        el('div',{class:'wk-label'},'WEEK OF '+new Date(wk).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}).toUpperCase()),
        el('div',{class:'wk-right'},
          el('div',{class:'wk-total'},hoursToHM(wTotal)),
          el('div',{class:`wk-ot ${otColor(wOT)}`},(wOT>=0?'+':'')+hoursToHM(wOT))
        )
      )
    );
    for (const d of dates.filter(d=>entries[d])) {
      const e=entries[d], dOT=e.absence?null:e.worked-DAILY_TARGET;
      const sub=e.absence?e.absence:`${e.start} – ${e.end}${e.note?' · '+e.note:''}`;
      sec.appendChild(el('div',{class:'history-day'},
        el('div',{}, el('div',{class:'hd-name'},formatDate(d)), el('div',{class:'hd-sub'},sub)),
        el('div',{class:'hd-right'},
          el('div',{class:'hd-worked'},e.absence?'—':hoursToHM(e.worked)),
          dOT!==null?el('div',{class:`hd-ot ${otColor(dOT)}`},(dOT>=0?'+':'')+hoursToHM(dOT)):null
        )
      ));
    }
    wrap.appendChild(sec);
  }
  wrap.appendChild(el('div',{class:'spacer'}));
  return wrap;
}

render();
</script>
